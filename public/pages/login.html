<!DOCTYPE html>
<html lang="id" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk — ThreatLens</title>

  <!-- Tema Terpusat: dark/light mode (harus pertama, sebelum Tailwind) -->
  <link rel="stylesheet" href="../css/theme.css">
  <script src="../js/theme.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'tl-bg':           'rgb(var(--tl-bg-rgb) / <alpha-value>)',
            'tl-surface':      'rgb(var(--tl-surface-rgb) / <alpha-value>)',
            'tl-surface-2':    'rgb(var(--tl-surface2-rgb) / <alpha-value>)',
            'tl-border':       'rgb(var(--tl-border-rgb) / <alpha-value>)',
            'tl-border-light': 'rgb(var(--tl-border-light-rgb) / <alpha-value>)',
            'tl-red':          'rgb(var(--tl-red-rgb) / <alpha-value>)',
            'tl-red-dim':      'rgb(var(--tl-red-rgb) / 0.15)',
            'tl-cyan':         'rgb(var(--tl-cyan-rgb) / <alpha-value>)',
            'tl-cyan-dim':     'rgb(var(--tl-cyan-rgb) / 0.15)',
            'tl-orange':       'rgb(var(--tl-orange-rgb) / <alpha-value>)',
            'tl-orange-dim':   'rgb(var(--tl-orange-rgb) / 0.15)',
            'tl-green':        'rgb(var(--tl-green-rgb) / <alpha-value>)',
            'tl-green-dim':    'rgb(var(--tl-green-rgb) / 0.15)',
            'tl-yellow':       'rgb(var(--tl-yellow-rgb) / <alpha-value>)',
            'tl-muted':        'rgb(var(--tl-muted-rgb) / <alpha-value>)',
            'tl-text':         'rgb(var(--tl-text-rgb) / <alpha-value>)',
            'tl-text-dim':     'rgb(var(--tl-text-dim-rgb) / <alpha-value>)',
          },
          fontFamily: {
            'syne': ['Syne', 'sans-serif'],
            'mono': ['Share Tech Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <!-- DARK/LIGHT MODE CSS VARIABLES -->
  <style>
    /* ============================================
       CSS VARIABLES - DARK MODE (Default)
       ============================================ */
    :root {
      --bg-primary: #080b10;
      --bg-secondary: #111820;
      --bg-card: #111820;
      --bg-input: #0d1218;
      --bg-elevated: #1a2332;
      --border-color: #1a2332;
      --border-hover: #2a3a50;
      --text-primary: #e8eaf0;
      --text-secondary: #a0a8b8;
      --text-muted: #5a6070;
      --text-dim: #8a90a0;
      --red: #ff2d2d;
      --red-dim: rgba(255, 45, 45, 0.2);
      --red-soft: #ff6b6b;
      --cyan: #00e5ff;
      --cyan-soft: #7eefff;
      --orange: #ff7c2d;
      --green: #00ff9c;
      --yellow: #ffc107;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-glow-red: 0 0 20px rgba(255, 45, 45, 0.15);
      --font-body: 'Syne', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --transition-base: 0.3s ease;
      --transition-fast: 0.2s ease;
    }

    /* Light mode dihandle oleh /css/theme.css */


    /* ============================================
       GLOBAL STYLES
       ============================================ */
    * {
      transition: background-color var(--transition-base),
                  border-color var(--transition-base),
                  color var(--transition-fast);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    /* ============================================
       THEME TOGGLE BUTTON
       ============================================ */
    .theme-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 1.1rem;
      transition: all var(--transition-base);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .theme-toggle:hover {
      border-color: var(--red);
      transform: scale(1.05);
    }

    /* ============================================
       LOGIN CARD
       ============================================ */
    .login-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-md);
    }

    .login-card h2 {
      color: var(--text-primary);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-card .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .login-card .subtitle a {
      color: var(--red);
      text-decoration: none;
    }

    .login-card .subtitle a:hover {
      text-decoration: underline;
    }

    .input-group {
      margin-bottom: 1.25rem;
    }

    .input-group label {
      display: block;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border var(--transition-fast);
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-dim);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background-color: var(--red);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background-color: var(--red-soft);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow-red);
    }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .login-footer a {
      color: var(--red);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .login-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    /* ============================================
       BACKGROUND GRID
       ============================================ */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,45,45,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,45,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(50px); }
    }

    .dot-blink {
      animation: blink 1.5s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body class="has-theme-toggle">

  <!-- Background grid (tetap) -->
  <div class="grid-bg fixed inset-0 z-0 opacity-50 pointer-events-none"></div>

  <!-- Konten utama -->
  <div class="relative z-10 w-full max-w-md px-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="../index.html" class="font-mono text-2xl text-[var(--red)] hover:opacity-80 transition-opacity inline-block">
        ⬡ Threat<span class="text-[var(--text-primary)]">Lens</span>
      </a>
      <p class="text-[var(--text-muted)] text-xs font-mono mt-1">// masuk akun</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-header">
        <h2>Login</h2>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle" title="Toggle Dark/Light Mode" aria-label="Toggle dark mode">
          <span id="theme-icon">🌙</span>
          <span id="theme-label" style="font-size:0.7rem;font-family:var(--font-mono);">Dark</span>
        </button>
      </div>

      <p class="subtitle">
        Belum punya akun? <a href="register.html">Daftar di sini</a>
      </p>

      <!-- Notifikasi -->
      <div id="error-box" class="hidden mb-4 bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3">
        <p id="error-msg" class="text-[var(--red)] text-sm font-mono"></p>
      </div>

      <div id="success-box" class="hidden mb-4 bg-green-500/10 border border-green-500/30 rounded-lg px-4 py-3">
        <p id="success-msg" class="text-[var(--green)] text-sm font-mono"></p>
      </div>

      <!-- Form -->
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="kamu@email.com" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <div class="flex items-center justify-between text-sm mb-4">
        <label class="flex items-center gap-2 text-[var(--text-muted)] cursor-pointer">
          <input type="checkbox" id="remember-me" class="accent-[var(--red)]" />
          Ingatkan saya
        </label>
        <a href="forgot_password.html" class="text-[var(--red)] hover:underline text-sm">Lupa password?</a>
      </div>

      <button onclick="handleLogin()" id="login-btn" class="btn-login">
        Masuk →
      </button>

      <div class="login-footer">
        <p>© 2024 ThreatLens — See Through Every Threat</p>
      </div>
    </div>
  </div>

  <!-- JAVASCRIPT LOGIN -->
  <script>
    // ============================================
    // LOGIN HANDLER
    // ============================================
    function showError(msg) {
      const box = document.getElementById('error-box');
      const text = document.getElementById('error-msg');
      document.getElementById('success-box').classList.add('hidden');
      text.textContent = '⚠ ' + msg;
      box.classList.remove('hidden');
    }

    function showSuccess(msg) {
      const box = document.getElementById('success-box');
      const text = document.getElementById('success-msg');
      document.getElementById('error-box').classList.add('hidden');
      text.textContent = '✓ ' + msg;
      box.classList.remove('hidden');
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Email dan password wajib diisi.');
        return;
      }

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || 'Login gagal.');
          return;
        }

        showSuccess('Login berhasil! Mengalihkan...');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        setTimeout(() => {
          window.location.href = data.user.role === 'admin'
            ? 'admin/dashboard_admin.html'
            : 'user/dashboard_user.html';
        }, 1000);

      } catch (err) {
        showError('Tidak dapat terhubung ke server.');
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
